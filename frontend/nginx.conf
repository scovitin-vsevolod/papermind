# nginx site config used by the runtime stage of the frontend image.
# Two responsibilities:
#   1) Serve the static Vite bundle, with SPA history-API fallback.
#   2) Proxy /api/* to the backend so the frontend code can keep using
#      the same relative URLs it used in dev (see api.ts).

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # Path to the Vite output copied in by the Dockerfile.
    root /usr/share/nginx/html;
    index index.html;

    # Gzip the lot — the React bundle is ~550 KB raw, ~175 KB gzipped.
    gzip on;
    gzip_types text/plain text/css application/javascript application/json
               image/svg+xml application/wasm;
    gzip_min_length 1024;

    # Cache hashed assets (Vite includes a content hash in every filename)
    # aggressively. index.html stays uncached so a deploy is picked up
    # on the next page load.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Proxy backend calls. The backend service name is configurable —
    # docker-compose, Fly.io's internal DNS, or whatever you wire it
    # to — via the BACKEND_HOST env var. Default points at the dev
    # name `backend` for use inside the same compose network.
    location /api/ {
        # Strip the /api prefix before forwarding, matching what the
        # Vite proxy does in dev so backend code stays unchanged.
        rewrite ^/api/(.*)$ /$1 break;
        proxy_pass http://backend:8109;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # File uploads can be a few MB; raise the default 1 MB cap.
        client_max_body_size 64M;
    }

    # SPA fallback — react-router would care, vanilla App.tsx doesn't,
    # but it's free insurance for future routing.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
