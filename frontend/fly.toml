# Fly.io machine config for the PaperMind frontend.
#
# Pure static — nginx in the runtime stage of the Dockerfile serves
# the prebuilt Vite bundle and proxies /api/* to the backend app.

app = "papermind-frontend"
primary_region = "ams"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 80
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "requests"
    hard_limit = 100
    soft_limit = 50

[[vm]]
  size = "shared-cpu-1x"
  # nginx + static files: 256 MB is plenty.
  memory = "256mb"
