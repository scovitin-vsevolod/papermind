name: CI

# Run on every push to main and on every pull request targeting main.
# Keeps feedback fast: this is a side-of-desk learning project, not a
# release-train monorepo — we don't need matrix builds across Python
# minor versions or three OSes.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: backend — lint + test
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      # uv is fast and matches the local dev setup exactly. Pinning a
      # version avoids surprise toolchain shifts breaking CI when an
      # `uv` major lands.
      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "0.4.x"

      - name: Cache the uv resolver state
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ hashFiles('backend/pyproject.toml') }}
          restore-keys: |
            uv-${{ runner.os }}-

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Lint (ruff)
        run: uv run ruff check app/ tests/

      - name: Test (pytest + coverage)
        # Coverage runs against app/ and prints a missing-lines summary so
        # a failing job is easy to triage from the Actions log alone.
        # The 70% gate matches Phase 4's stated target.
        run: uv run pytest --cov=app --cov-report=term-missing --cov-fail-under=70

  frontend:
    name: frontend — type check + build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          # Built-in npm cache keyed off package-lock.json.
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        # `ci` (not `install`) — strict mode that respects the lock file
        # and refuses if it's out of sync with package.json. Reproducible.
        run: npm ci

      - name: Build (tsc + vite)
        # `npm run build` does `tsc -b && vite build`. tsc catches type
        # errors before bundling so a green CI is a green type check.
        run: npm run build

  # ── Continuous deployment ─────────────────────────────────────────────────
  # Runs only on direct pushes to main (not on PRs from anyone, including
  # fork PRs — Secrets aren't even available there). Waits for both backend
  # and frontend jobs to finish green; if either is red, this job is
  # skipped and the prod box stays on the previous commit.
  deploy:
    name: deploy to EC2
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      # SSH into the EC2 box and run scripts/deploy.sh, which lives in
      # the repo and is checked out by `git fetch` inside the script
      # itself. We do NOT actions/checkout here — the work happens on
      # the server, on the freshly-pulled tree.
      #
      # `appleboy/ssh-action` pinned at a recent tagged release. Once
      # this is in steady state, swap @v1.2.0 for a commit SHA to lock
      # against the (small) supply-chain risk of a tag being moved.
      - name: SSH into EC2 and run deploy.sh
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          # script_stop=true → if any line in the remote script exits
          # non-zero, the action fails. Together with `set -euo pipefail`
          # inside deploy.sh, this gives us no-silent-failure deploys.
          script_stop: true
          # 10 min cap matches the timeout-minutes above with buffer.
          command_timeout: 10m
          script: |
            cd /var/www/pm && bash scripts/deploy.sh
